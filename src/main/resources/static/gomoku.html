<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五子棋 - AI对战</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gomoku.css?v=20260405">
</head>
<body>
    <div class="header">
        <h1>五子棋</h1>
    </div>
    
    <div class="info-panel">
        <div class="turn-indicator">
            <span>当前:</span>
            <div class="turn-piece" id="turnPiece"></div>
            <span id="currentPlayerText">你(黑方)</span>
        </div>
        
        <div class="stats">
            <div class="stat-item">步数: <span class="stat-value" id="moveCount">0</span></div>
            <div class="stat-item">AI思考: <span class="stat-value" id="thinkTime">-</span></div>
        </div>
        
        <div class="control-panel">
            <label>难度:</label>
            <select id="difficulty">
                <option value="1">简单</option>
                <option value="2">中等</option>
                <option value="3" selected>困难</option>
            </select>
            <label>先手:</label>
            <select id="firstPlayer">
                <option value="1" selected>我(黑)</option>
                <option value="2">AI(白)</option>
            </select>
            <button class="btn-apply" onclick="applyDifficulty()">应用</button>
            <button class="btn-sound sound-toggle" onclick="toggleSound()" title="音效开关">🔊</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="board-wrapper">
            <div class="board-container" id="boardContainer">
                <div class="board-with-coords">
                    <div class="col-labels" id="colLabels"></div>
                    <div id="boardRows"></div>
                </div>
            </div>
        </div>
        <div class="history-panel" id="historyPanel">
            <h3>📜 棋谱记录</h3>
            <div class="history-list" id="historyList">
                <div style="color:rgba(255,255,255,0.4);text-align:center;padding:20px 0;font-size:13px;">暂无落子</div>
            </div>
        </div>
    </div>
    
    <div id="message"></div>
    
    <div class="controls">
        <button class="btn-primary" onclick="resetGame()">重新开始</button>
        <button class="btn-secondary" id="undoBtn" onclick="undoMove()" disabled>悔棋</button>
        <button class="btn-tertiary" onclick="exportBoardImage()">📷 导出棋谱</button>
    </div>
    
    <!-- 胜利遮罩 -->
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-text" id="victoryText">你赢了!</div>
        <button class="victory-btn" onclick="closeVictoryAndReset()">再来一局</button>
    </div>
    
    <script src="gomoku.js?v=20260405"></script>
</body>
</html>
