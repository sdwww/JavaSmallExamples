<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五子棋 - AI对战</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            color: white;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 2em;
        }
        .info {
            color: white;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .info span {
            font-weight: bold;
        }
        .black-text { color: #1a1a1a; }
        .white-text { color: #f0f0f0; text-shadow: 1px 1px 1px #333; }
        
        .stats {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 14px;
        }
        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 15px;
        }
        
        .difficulty-select {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .difficulty-select label {
            color: white;
            font-weight: bold;
        }
        .difficulty-select select {
            padding: 8px 15px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.9);
            cursor: pointer;
        }
        .difficulty-select select:hover {
            background: rgba(255,255,255,1);
        }
        
        .board-wrapper {
            position: relative;
            overflow: hidden;
            touch-action: none;
            max-width: 100vw;
        }
        .board-container {
            background: #DEB887;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            cursor: grab;
        }
        .board-container:active {
            cursor: grabbing;
        }
        .board-container.zoomed {
            transform-origin: center center;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(15, 52px);
            grid-template-rows: repeat(15, 52px);
            gap: 0;
            background: #DEB887;
            position: relative;
        }
        .cell {
            width: 52px;
            height: 52px;
            border: 1px solid #8B7355;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        /* 增加点击范围 */
        .cell::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
        }
        .cell:hover:not(.occupied) {
            background: rgba(255, 255, 255, 0.3);
        }
        .cell.disabled {
            cursor: not-allowed;
        }
        .piece {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .piece.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }
        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }
        .piece.last {
            box-shadow: 0 0 0 3px #4CAF50, 2px 2px 4px rgba(0,0,0,0.3);
            animation: pieceAppear 0.3s ease-out;
        }
        @keyframes pieceAppear {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(0);
        }
        button.difficulty-btn {
            background: #2196F3;
        }
        button.difficulty-btn:hover {
            background: #1976D2;
        }
        #message {
            margin-top: 15px;
            font-size: 20px;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            min-height: 30px;
            text-align: center;
        }
        .game-over {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .thinking {
            color: #90CAF9 !important;
            font-size: 14px;
        }
        .sound-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .sound-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
        
        /* 棋盘坐标 */
        .board-with-coords {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .col-labels {
            display: flex;
            margin-bottom: 2px;
            padding-left: 22px;
        }
        .col-labels span {
            width: 52px;
            text-align: center;
            font-size: 12px;
            color: #5a4a3a;
            font-weight: bold;
        }
        .board-row-wrapper {
            display: flex;
            align-items: center;
        }
        .row-label {
            width: 20px;
            text-align: right;
            font-size: 12px;
            color: #5a4a3a;
            font-weight: bold;
            margin-right: 2px;
        }
        
        /* 主内容区 */
        .main-content {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        /* 棋谱面板 */
        .history-panel {
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 12px;
            width: 160px;
            max-height: 580px;
            display: flex;
            flex-direction: column;
        }
        .history-panel h3 {
            color: white;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            font-size: 13px;
            color: white;
            line-height: 1.8;
        }
        .history-list .move-item {
            padding: 2px 6px;
            border-radius: 3px;
            cursor: default;
        }
        .history-list .move-item:nth-child(odd) {
            background: rgba(255,255,255,0.05);
        }
        .history-list .move-item.latest {
            background: rgba(76,175,80,0.3);
        }
        
        /* 悔棋按钮 */
        button.undo-btn {
            background: #FF9800;
        }
        button.undo-btn:hover {
            background: #F57C00;
        }
        button.undo-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            h1 { font-size: 1.5em; }
            .info { font-size: 14px; gap: 10px; }
            #board {
                grid-template-columns: repeat(15, 30px);
                grid-template-rows: repeat(15, 30px);
            }
            .cell {
                width: 30px;
                height: 30px;
            }
            .cell::before {
                top: -12px;
                left: -12px;
                right: -12px;
                bottom: -12px;
            }
            .piece {
                width: 24px;
                height: 24px;
            }
            .board-container {
                padding: 10px;
            }
            .col-labels span { width: 30px; font-size: 11px; }
            .row-label { font-size: 10px; width: 16px; }
            .col-labels { padding-left: 18px; }
            .history-panel { width: 130px; max-height: 420px; }
            .history-panel h3 { font-size: 12px; }
            .history-list { font-size: 11px; }
        }
        
        @media (max-width: 480px) {
            body { padding: 10px; }
            h1 { font-size: 1.2em; }
            #board {
                grid-template-columns: repeat(15, 22px);
                grid-template-rows: repeat(15, 22px);
            }
            .cell {
                width: 22px;
                height: 22px;
            }
            .cell::before {
                top: -16px;
                left: -16px;
                right: -16px;
                bottom: -16px;
            }
            .piece {
                width: 18px;
                height: 18px;
            }
            .col-labels span { width: 22px; font-size: 10px; }
            .row-label { font-size: 9px; width: 14px; }
            .col-labels { padding-left: 16px; }
            .history-panel { display: none; }
        }
    </style>
</head>
<body>
    <h1>五子棋 - AI对战</h1>
    <div class="info">
        <span>当前: <span id="currentPlayer" class="black-text">●</span></span>
        <div class="stats">
            <span class="stat-item">步数: <span id="moveCount">0</span></span>
            <span class="stat-item">AI思考: <span id="thinkTime">-</span></span>
        </div>
        <div class="difficulty-select">
            <label>难度:</label>
            <select id="difficulty">
                <option value="1">简单</option>
                <option value="2">中等</option>
                <option value="3" selected>困难</option>
            </select>
            <button class="difficulty-btn" onclick="applyDifficulty()">应用难度</button>
            <button class="sound-toggle" onclick="toggleSound()" title="音效开关">🔊</button>
        </div>
    </div>
    <div class="main-content">
        <div class="board-wrapper">
            <div class="board-container" id="boardContainer">
                <div class="board-with-coords">
                    <div class="col-labels" id="colLabels"></div>
                    <div id="boardRows"></div>
                </div>
            </div>
        </div>
        <div class="history-panel" id="historyPanel">
            <h3>📜 棋谱记录</h3>
            <div class="history-list" id="historyList">
                <div style="color:rgba(255,255,255,0.5);text-align:center;padding:20px 0;">暂无落子</div>
            </div>
        </div>
    </div>
    <div id="message"></div>
    <div class="controls">
        <button onclick="resetGame()">重新开始</button>
        <button class="undo-btn" id="undoBtn" onclick="undoMove()" disabled>悔棋</button>
    </div>

    <script>
        const BOARD_SIZE = 15;
        let sessionId = null;
        let board = [];
        let currentPlayer = 1;
        let gameOver = false;
        let lastMove = null;
        let isThinking = false;
        let moveCountNum = 0; // 步数
        let aiThinkStartTime = 0; // AI思考开始时间
        let soundEnabled = true; // 音效开关
        let audioContext = null; // 音频上下文

        // 初始化音频
        function initAudio() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.log('浏览器不支持音频API');
                }
            }
        }

        // 播放落子音效
        function playMoveSound() {
            if (!soundEnabled || !audioContext) return;
            
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.error('播放音效失败:', e);
            }
        }

        // 播放胜利音效
        function playWinSound() {
            if (!soundEnabled || !audioContext) return;
            
            try {
                const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
                notes.forEach((freq, i) => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.15);
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + i * 0.15);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + i * 0.15 + 0.3);
                    
                    oscillator.start(audioContext.currentTime + i * 0.15);
                    oscillator.stop(audioContext.currentTime + i * 0.15 + 0.3);
                });
            } catch (e) {
                console.error('播放胜利音效失败:', e);
            }
        }

        // 切换音效
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.querySelector('.sound-toggle');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            if (soundEnabled) {
                initAudio();
            }
        }

        // 更新步数显示
        function updateMoveCount(count) {
            moveCountNum = count;
            document.getElementById('moveCount').textContent = count;
        }

        // 更新AI思考时间
        function updateThinkTime(ms) {
            if (ms !== null && ms !== undefined) {
                document.getElementById('thinkTime').textContent = (ms / 1000).toFixed(1) + '秒';
            } else {
                document.getElementById('thinkTime').textContent = '-';
            }
        }

        // 初始化棋盘
        function initBoard() {
            const boardRowsEl = document.getElementById('boardRows');
            const colLabelsEl = document.getElementById('colLabels');
            boardRowsEl.innerHTML = '';
            colLabelsEl.innerHTML = '';

            // 生成列标签 A-O
            for (let j = 0; j < BOARD_SIZE; j++) {
                const label = document.createElement('span');
                label.textContent = String.fromCharCode(65 + j);
                colLabelsEl.appendChild(label);
            }

            // 生成行（带行号和格子）
            for (let i = 0; i < BOARD_SIZE; i++) {
                const rowWrapper = document.createElement('div');
                rowWrapper.className = 'board-row-wrapper';
                
                const rowLabel = document.createElement('span');
                rowLabel.className = 'row-label';
                rowLabel.textContent = (i + 1).toString();
                rowWrapper.appendChild(rowLabel);
                
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.onclick = () => makeMove(i, j);
                    rowWrapper.appendChild(cell);
                }
                boardRowsEl.appendChild(rowWrapper);
            }
            
            // 重置所有显示状态
            document.getElementById('moveCount').textContent = '0';
            document.getElementById('thinkTime').textContent = '-';
            document.getElementById('currentPlayer').textContent = '● (你)';
            document.getElementById('currentPlayer').className = 'black-text';
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = '';
            updateUndoButton(false);
            updateHistory([]);
            
            // 添加移动端手势支持（只在触摸设备上）
            if ('ontouchstart' in window) {
                initGestures();
            }
        }

        // 获取难度
        function getDifficulty() {
            return parseInt(document.getElementById('difficulty').value);
        }

        // 移动端手势支持（缩放和平移）
        let gesturesInitialized = false; // 防止重复初始化
        
        function initGestures() {
            // 只初始化一次
            if (gesturesInitialized) return;
            gesturesInitialized = true;
            
            const container = document.getElementById('boardContainer');
            if (!container) return;
            
            let scale = 1;
            let isDragging = false;
            let startX, startY, translateX = 0, translateY = 0;
            let lastTap = 0;
            
            // 双击缩放
            container.addEventListener('touchend', function(e) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    e.preventDefault();
                    if (scale === 1) {
                        scale = 1.5;
                    } else {
                        scale = 1;
                        translateX = 0;
                        translateY = 0;
                    }
                    container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
                }
                lastTap = currentTime;
            }, { passive: false });
            
            // 触摸移动（仅在放大状态下）
            container.addEventListener('touchstart', function(e) {
                if (scale > 1 && e.touches.length === 1) {
                    isDragging = true;
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                }
            }, { passive: true });
            
            container.addEventListener('touchmove', function(e) {
                if (isDragging && e.touches.length === 1) {
                    e.preventDefault();
                    translateX = e.touches[0].clientX - startX;
                    translateY = e.touches[0].clientY - startY;
                    container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
                }
            }, { passive: false });
            
            container.addEventListener('touchend', function() {
                isDragging = false;
            }, { passive: true });
        }

        // 应用难度
        async function applyDifficulty() {
            if (!sessionId) {
                initGame();
                return;
            }
            const difficulty = getDifficulty();
            try {
                await fetch(`/api/gomoku/reset/${sessionId}?difficulty=${difficulty}`, {
                    method: 'POST'
                });
                initGame();
            } catch (error) {
                console.error('设置难度失败:', error);
                initGame();
            }
        }

        // 初始化游戏
        async function initGame() {
            try {
                console.log('开始初始化游戏...');
                initAudio(); // 初始化音频
                
                // 先初始化棋盘DOM
                initBoard();
                console.log('棋盘DOM已初始化');
                
                // 创建空棋盘数据
                board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
                
                // 调用API创建新游戏
                const difficulty = getDifficulty();
                const response = await fetch(`/api/gomoku/new?difficulty=${difficulty}`);
                const data = await response.json();
                
                console.log('新游戏响应:', data);
                
                // 更新所有状态
                sessionId = data.sessionId;
                board = data.board;
                currentPlayer = data.currentPlayer;
                gameOver = data.gameOver;
                updateMoveCount(data.moveCount || 0);
                updateThinkTime(null);
                updateHistory(data.moveHistory || []);
                updateUndoButton(data.canUndo || false);
                
                // 渲染棋盘
                renderBoard();
                updateCurrentPlayer();
                document.getElementById('message').textContent = '';
                document.getElementById('message').className = '';
                
                console.log('游戏初始化完成');
            } catch (error) {
                console.error('初始化游戏失败:', error);
                // 即使出错也要确保棋盘显示
                initBoard();
                board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
                renderBoard();
            }
        }

        // 渲染棋盘
        function renderBoard() {
            const boardRowsEl = document.getElementById('boardRows');
            if (!boardRowsEl || boardRowsEl.children.length === 0) {
                console.warn('棋盘尚未初始化，跳过渲染');
                return;
            }
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                const rowWrapper = boardRowsEl.children[i];
                if (!rowWrapper) continue;
                
                for (let j = 0; j < BOARD_SIZE; j++) {
                    // +1 跳过 row-label
                    const cell = rowWrapper.children[j + 1];
                    if (!cell) continue;
                    
                    cell.innerHTML = '';
                    cell.className = 'cell';
                    
                    if (currentPlayer === 2 && !gameOver) {
                        cell.classList.add('disabled');
                    }

                    if (board[i][j] !== 0) {
                        cell.classList.add('occupied');
                        cell.classList.remove('disabled');
                        const piece = document.createElement('div');
                        piece.className = 'piece ' + (board[i][j] === 1 ? 'black' : 'white');
                        cell.appendChild(piece);
                    }
                }
            }
        }

        // 落子
        async function makeMove(row, col) {
            if (gameOver || board[row][col] !== 0 || currentPlayer !== 1 || isThinking) return;

            try {
                isThinking = true;
                aiThinkStartTime = Date.now(); // 记录AI思考开始时间
                document.getElementById('message').textContent = 'AI思考中...';
                document.getElementById('message').className = 'thinking';
                
                // 播放落子音效
                playMoveSound();

                const response = await fetch(`/api/gomoku/move/${sessionId}?row=${row}&col=${col}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.playerMoveSuccess) {
                    // 更新棋盘
                    board = data.board;
                    gameOver = data.gameOver;
                    currentPlayer = data.currentPlayer;
                    updateMoveCount(data.moveCount || 0);
                    updateHistory(data.moveHistory || []);
                    updateUndoButton(data.canUndo);
                    
                    renderBoard();
                    
                    // 高亮玩家落子
                    if (data.playerMove) {
                        highlightMove(data.playerMove[0], data.playerMove[1]);
                    }
                    
                    // 如果需要轮询获取AI落子
                    if (data.aiNeedPoll) {
                        await pollAiMove();
                        // 轮询结束后，再次检查游戏状态（AI可能获胜）
                        if (gameOver) {
                            updateUndoButton(false);
                        } else {
                            updateCurrentPlayer();
                            updateMoveCount(data.moveCount || 0);
                            document.getElementById('message').textContent = '';
                            document.getElementById('message').className = '';
                        }
                    } else if (data.aiMove) {
                        // 兼容模式：直接获取AI落子
                        highlightMove(data.aiMove[0], data.aiMove[1]);
                        // 检查AI落子后游戏是否结束
                        if (data.gameOver && data.winnerText) {
                            gameOver = data.gameOver;
                            updateMoveCount(data.moveCount || 0);
                            document.getElementById('message').textContent = data.winnerText;
                            document.getElementById('message').className = 'game-over';
                            playWinSound(); // 播放胜利音效
                        } else {
                            updateCurrentPlayer();
                            updateMoveCount(data.moveCount || 0);
                            document.getElementById('message').textContent = '';
                            document.getElementById('message').className = '';
                        }
                    } else {
                        // 玩家落子后获胜的情况
                        if (gameOver && data.winnerText) {
                            updateMoveCount(data.moveCount || 0);
                            document.getElementById('message').textContent = data.winnerText;
                            document.getElementById('message').className = 'game-over';
                            playWinSound(); // 播放胜利音效
                        } else {
                            updateCurrentPlayer();
                            updateMoveCount(data.moveCount || 0);
                            document.getElementById('message').textContent = '';
                            document.getElementById('message').className = '';
                        }
                    }
                } else if (data.error) {
                    document.getElementById('message').textContent = data.error;
                    document.getElementById('message').className = '';
                }
            } catch (error) {
                console.error('落子失败:', error);
            } finally {
                isThinking = false;
            }
        }

        // 轮询获取AI落子
        async function pollAiMove() {
            let retryCount = 0;
            const maxRetries = 100; // 最多重试100次（10秒）
            
            while (isThinking && retryCount < maxRetries) {
                try {
                    const response = await fetch(`/api/gomoku/ai-move/${sessionId}`);
                    const data = await response.json();

                    // 检查是否有错误
                    if (data.error) {
                        console.error('AI落子错误:', data.error);
                        // 如果游戏不存在，重新初始化
                        if (data.error === '游戏不存在') {
                            isThinking = false;
                            initGame();
                            return;
                        }
                    }

                    // 确保数据有效
                    if (data.board) {
                        board = data.board;
                    }
                    if (data.currentPlayer !== undefined) {
                        currentPlayer = data.currentPlayer;
                    }
                    if (data.gameOver !== undefined) {
                        gameOver = data.gameOver;
                    }

                    renderBoard();

                    // 高亮AI落子
                    if (data.aiMove) {
                        highlightMove(data.aiMove[0], data.aiMove[1]);
                    }
                    
                    // 更新棋谱和悔棋按钮
                    updateHistory(data.moveHistory || []);
                    updateUndoButton(data.canUndo);
                    
                    // 检查游戏是否结束（优先显示胜利提示）
                    if (gameOver) {
                        document.getElementById('message').textContent = data.winnerText || '游戏结束';
                        document.getElementById('message').className = 'game-over';
                        isThinking = false;
                        break;
                    }
                    
                    // 如果AI已经落子且游戏未结束，更新状态并退出轮询
                    if (data.aiMove) {
                        updateCurrentPlayer();
                        document.getElementById('message').textContent = '';
                        document.getElementById('message').className = '';
                        isThinking = false;
                        break;
                    }
                    
                    retryCount++;
                } catch (error) {
                    console.error('获取AI落子失败:', error);
                    retryCount++;
                }

                // 等待一段时间后重试
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            
            // 超时处理
            if (retryCount >= maxRetries) {
                console.error('AI落子超时');
                document.getElementById('message').textContent = 'AI响应超时，请重试';
                document.getElementById('message').className = '';
                isThinking = false;
            }
        }

        // 高亮落子
        function highlightMove(row, col) {
            const boardRowsEl = document.getElementById('boardRows');
            if (!boardRowsEl || !boardRowsEl.children[row]) return;
            const cell = boardRowsEl.children[row].children[col + 1]; // +1 跳过 row-label
            if (!cell) return;
            const piece = cell.querySelector('.piece');
            if (piece) piece.classList.add('last');
            lastMove = { row, col };
        }

        // 更新当前玩家显示
        function updateCurrentPlayer() {
            const playerEl = document.getElementById('currentPlayer');
            if (currentPlayer === 1) {
                playerEl.textContent = '● (你)';
                playerEl.className = 'black-text';
            } else {
                playerEl.textContent = '● (AI)';
                playerEl.className = 'white-text';
            }
        }

        // 重置游戏 - 使用创建新游戏的方式，确保状态完全干净
        async function resetGame() {
            if (isThinking) {
                console.log('正在思考中，请稍候...');
                return;
            }
            
            // 强制重置所有状态
            isThinking = false;
            gameOver = false;
            lastMove = null;
            
            try {
                console.log('开始重置游戏...');
                
                // 先重新初始化棋盘DOM（清空所有格子）
                initBoard();
                console.log('棋盘DOM已重置');
                
                // 直接创建新游戏，确保状态完全干净，添加时间戳避免缓存
                const difficulty = getDifficulty();
                const timestamp = Date.now();
                const response = await fetch(`/api/gomoku/new?difficulty=${difficulty}&_t=${timestamp}`);
                const data = await response.json();
                
                console.log('新游戏响应:', data);

                // 完整更新所有状态
                sessionId = data.sessionId;
                board = data.board;
                currentPlayer = data.currentPlayer;
                gameOver = data.gameOver;
                
                // 更新统计数据
                updateMoveCount(data.moveCount || 0);
                updateThinkTime(null);
                updateHistory(data.moveHistory || []);
                updateUndoButton(data.canUndo || false);

                document.getElementById('message').textContent = '';
                document.getElementById('message').className = '';

                // 重新渲染棋盘和状态
                renderBoard();
                updateCurrentPlayer();
                
                console.log('游戏重置完成 - 棋盘:', board, '当前玩家:', currentPlayer, '游戏结束:', gameOver);
                console.log('页面显示 - 当前玩家:', document.getElementById('currentPlayer').textContent, '步数:', document.getElementById('moveCount').textContent);
                
                // 检查是否需要等待AI落子（理论上不应该，因为新游戏应该从玩家开始）
                if (currentPlayer === 2 && !gameOver) {
                    console.warn('警告：新游戏AI回合，这不应该发生');
                }
            } catch (error) {
                console.error('重置游戏失败:', error);
                initGame();
            }
        }

        // 页面加载时初始化
        // 添加版本号强制刷新缓存
        console.log('五子棋游戏初始化 - 版本 20260404-v10 (添加悔棋+坐标+棋谱)');
        
        // 悔棋功能
        async function undoMove() {
            if (!sessionId || isThinking || gameOver) return;
            
            try {
                const response = await fetch(`/api/gomoku/undo/${sessionId}`, { method: 'POST' });
                const data = await response.json();
                
                if (data.undoSuccess) {
                    board = data.board;
                    currentPlayer = data.currentPlayer;
                    gameOver = data.gameOver;
                    lastMove = null;
                    updateMoveCount(data.moveCount || 0);
                    updateHistory(data.moveHistory || []);
                    updateUndoButton(data.canUndo);
                    renderBoard();
                    updateCurrentPlayer();
                    document.getElementById('message').textContent = '';
                    document.getElementById('message').className = '';
                } else {
                    document.getElementById('message').textContent = data.error || '无法悔棋';
                    setTimeout(() => {
                        document.getElementById('message').textContent = '';
                    }, 2000);
                }
            } catch (error) {
                console.error('悔棋失败:', error);
            }
        }
        
        // 更新悔棋按钮状态
        function updateUndoButton(canUndo) {
            const btn = document.getElementById('undoBtn');
            if (btn) btn.disabled = !canUndo;
        }
        
        // 更新棋谱显示
        function updateHistory(historyList) {
            const listEl = document.getElementById('historyList');
            if (!listEl) return;
            
            if (!historyList || historyList.length === 0) {
                listEl.innerHTML = '<div style="color:rgba(255,255,255,0.5);text-align:center;padding:20px 0;">暂无落子</div>';
                return;
            }
            
            listEl.innerHTML = '';
            historyList.forEach((text, idx) => {
                const div = document.createElement('div');
                div.className = 'move-item' + (idx === historyList.length - 1 ? ' latest' : '');
                div.textContent = text;
                listEl.appendChild(div);
            });
            
            // 滚动到底部
            listEl.scrollTop = listEl.scrollHeight;
        }
        
        initGame();
    </script>
</body>
</html>
